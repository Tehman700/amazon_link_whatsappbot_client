name: Deploy WhatsApp adapter to EC2

on:
  push:
    branches: [main]
    paths:
      - "whatsapp-adapter/**"
      - ".github/workflows/deploy-adapter.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull and restart on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/amazon_link_whatsappbot_client
            git fetch origin main
            git reset --hard origin/main
            cd whatsapp-adapter
            npm ci --omit=dev
            pm2 restart wa-adapter --update-env || pm2 start ecosystem.config.cjs
            pm2 save
